<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // إعدادات الاتصال برابط قاعدة بياناتكِ الذي أرسلتِه
  const firebaseConfig = {
    apiKey: "AIzaSyAqC7a5CRtjMRmuBwPWC5TXWMQkMGIlQuQ",
    authDomain: "zaw-research-hub.firebaseapp.com",
    // هذا هو الرابط الذي نسختِه، قمت بوضعه هنا للربط المباشر
    databaseURL: "https://zaw-research-hub-default-rtdb.firebaseio.com", 
    projectId: "zaw-research-hub",
    storageBucket: "zaw-research-hub.appspot.com",
    messagingSenderId: "750460537109",
    appId: "1:750460537109:web:687d785a83a3c8d2d2011c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // وظيفة نشر المنشور لكي يظهر في صفحة الداتا
  window.addPost = () => {
    const content = document.getElementById('postInput').value;
    if(!content) return;

    // إرسال البيانات إلى "مجلد" اسمه posts داخل قاعدة بيانات ZAW
    push(ref(db, 'posts'), {
      author: "د. زينب عبدالله",
      text: content,
      likes: 0,
      date: new Date().toLocaleString('ar-EG')
    }).then(() => {
        alert("تم النشر بنجاح! انظري لشاشة Firebase الآن");
        document.getElementById('postInput').value = "";
    });
  };

  // وظيفة الإعجاب (تغير الرقم في الداتا مباشرة)
  window.likePost = (postId, currentLikes) => {
    update(ref(db, 'posts/' + postId), {
      likes: (currentLikes || 0) + 1
    });
  };

  // عرض المنشورات حياً من الداتا
  onValue(ref(db, 'posts'), (snapshot) => {
    const data = snapshot.val();
    let html = "";
    for(let id in data) {
      html = `
        <div class="post-card" style="background:#121212; padding:20px; border-radius:15px; margin-bottom:15px; border:1px solid #222;">
          <strong style="color:#D4AF37;">🎓 ${data[id].author}</strong>
          <p style="color:white; margin:15px 0;">${data[id].text}</p>
          <div style="display:flex; gap:20px;">
            <span style="cursor:pointer; color:#888;" onclick="likePost('${id}', ${data[id].likes})">👍 ${data[id].likes || 0}</span>
            <span style="color:#888;">💬 Comment</span>
          </div>
        </div>
      ` + html;
    }
    document.getElementById('feed').innerHTML = html;
  });
</script>
