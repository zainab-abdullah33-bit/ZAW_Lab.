<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Research Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --blue: #1e88e5; --dark: #111827; --card: #1f2937; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 50px; }
        
        /* الهيدر الجديد لضمان ظهور الملف الشخصي */
        header { background: #000; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .user-pill { background: var(--card); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 30px; height: 30px; background: var(--gold); border-radius: 50%; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .container { padding: 20px; max-width: 900px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(212,175,55,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        h2 { color: var(--gold); margin-top: 0; font-size: 1.2em; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #374151; margin-bottom: 10px; background: #111827; color: white; box-sizing: border-box; font-family: 'Cairo'; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-family: 'Cairo'; transition: 0.2s; margin-bottom: 5px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }

        /* نافذة التسجيل */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 15px; border: 2px solid var(--gold); z-index: 2000; width: 85%; max-width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; }
        
        #collabWall { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 10px; text-align: right; max-height: 150px; overflow-y: auto; }
        .post { border-right: 3px solid var(--gold); background: rgba(255,255,255,0.05); padding: 8px; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body onload="checkUser()">

    <header>
        <div class="user-pill" onclick="openLogin()">
            <div class="avatar" id="navInit">؟</div>
            <span id="navName">تسجيل الباحث</span>
        </div>
        <div style="color: var(--gold); font-weight: bold;">ZAW HUB</div>
    </header>

    <div class="container">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="color: white; margin-bottom: 0;">منصة الأستاذة الدكتورة زينب عبدالله</h1>
            <p style="color: var(--gold); font-size: 14px; margin-top: 5px;">🧬 Cellular & Molecular Biology Professional Hub</p>
        </div>

        <!-- 1. الملف الشخصي (ظاهر دائماً الآن) -->
        <div id="profileBox" class="card" style="display:none; background: linear-gradient(to left, #1f2937, #111827);">
            <h2 id="welcomeName">مرحباً دكتورة</h2>
            <p id="welcomeBio" style="font-size: 13px; opacity: 0.8;"></p>
            <button class="btn btn-blue" style="width: auto; padding: 5px 15px; font-size: 12px;" onclick="logout()">خروج</button>
        </div>

        <!-- 2. البحث العلمي -->
        <div class="card">
            <h2>🔍 البحث في المجلات الرصينة</h2>
            <input type="text" id="sq" placeholder="ادخلي الكلمات المفتاحية للبحث...">
            <button class="btn btn-blue" onclick="var v=document.getElementById('sq').value; if(v) window.open('https://scholar.google.com/scholar?q='+encodeURIComponent(v));">بحث في Google Scholar 🔎</button>
        </div>

        <!-- 3. التعاون البحثي -->
        <div class="card">
            <h2>🤝 طلب تعاون بحثي</h2>
            <button class="btn btn-gold" onclick="postCollab()">نشر طلب تعاون باسمي</button>
            <div id="collabWall"><p style="text-align:center; font-size:12px; color:#666;">لا توجد طلبات تعاون حالياً</p></div>
        </div>

        <!-- 4. قاعة المؤتمرات (أعدناها للظهور) -->
        <div class="card" style="border-color: #1e88e5;">
            <h2>🏛️ قاعة الاجتماعات والمؤتمرات</h2>
            <p style="font-size: 13px;">عقد سمنار أو اجتماع بحثي فوري عبر الفيديو.</p>
            <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Conference_Room', '_blank')">دخول القاعة الافتراضية 📹</button>
        </div>
    </div>

    <!-- نافذة التسجيل -->
    <div class="overlay" id="overlay" onclick="closeLogin()"></div>
    <div class="modal" id="loginModal">
        <h2 style="text-align:center;">ملف الباحث</h2>
        <input type="text" id="inName" placeholder="الاسم الكامل">
        <input type="text" id="inBio" placeholder="التخصص الدقيق">
        <button class="btn btn-gold" onclick="saveUser()">حفظ وإغلاق</button>
    </div>

    <script>
        function openLogin() { document.getElementById('loginModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function closeLogin() { document.getElementById('loginModal').style.display='none'; document.getElementById('overlay').style.display='none'; }

        function saveUser() {
            const n = document.getElementById('inName').value;
            const b = document.getElementById('inBio').value;
            if(n && b) {
                localStorage.setItem('zaw_name', n);
                localStorage.setItem('zaw_bio', b);
                location.reload();
            }
        }

        function checkUser() {
            const n = localStorage.getItem('zaw_name');
            const b = localStorage.getItem('zaw_bio');
            if(n) {
                document.getElementById('navName').innerText = n;
                document.getElementById('navInit').innerText = n.charAt(0).toUpperCase();
                document.getElementById('profileBox').style.display = 'block';
                document.getElementById('welcomeName').innerText = "الباحثة: " + n;
                document.getElementById('welcomeBio').innerText = "مجال البحث: " + b;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function postCollab() {
            const n = localStorage.getItem('zaw_name');
            const b = localStorage.getItem('zaw_bio');
            if(!n) { alert("لطفاً، سجلي دخولكِ أولاً دكتورة."); openLogin(); return; }
            const wall = document.getElementById('collabWall');
            if(wall.innerHTML.includes("لا توجد")) wall.innerHTML = "";
            const div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = <b>${n}</b><br><small>${b}</small>;
            wall.prepend(div);
            alert("تم النشر بنجاح! ✅");
        }
    </script>
</body>
</html>
