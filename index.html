<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAW Research Hub</title>
  <style>
    body { background-color: #0d1b2a; color: #e0e1dd; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1b263b; padding: 30px; border-radius: 20px; border: 2px solid #e9c46a; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #e9c46a; margin-bottom: 15px; object-fit: cover; }
    h1 { color: #e9c46a; margin-bottom: 5px; font-size: 24px; }
    p { font-size: 14px; margin-bottom: 20px; color: #a2adbb; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #415a77; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 10px; border: none; background: #e9c46a; color: #0d1b2a; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #f4a261; }
    #msg { margin-top: 15px; font-size: 13px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <img src="dr_zainab.jpg" alt="Dr. Zainab">
    <h1>ZAW Research Hub</h1>
    <p>بوابة الباحثين المتطورة لنتائج PDB و GROMACS</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="signUp()">إنشاء حساب باحث جديد</button>
    <div id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAqc7a5CRtjMRmuBwPWC5TXWMQkMGIlQuQ",
      authDomain: "zaw-lab.firebaseapp.com",
      projectId: "zaw-lab",
      storageBucket: "zaw-lab.firebasestorage.app",
      messagingSenderId: "1093121510424",
      appId: "1:1093121510424:web:6c6f72236a2872659e93b1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signUp = () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => { msg.innerHTML = "<span style='color:#4ade80;'>✅ تم التسجيل بنجاح!</span>"; })
        .catch((error) => { msg.innerHTML = "<span style='color:#f87171;'>❌ خطأ: " + error.message + "</span>"; });
    };
  </script>
</body>
</html>
