<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; justify-center; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 2px solid #fbbf24; border-radius: 24px; padding: 2rem; width: 100%; max-width: 400px; text-align: center; margin: auto; }
        .gold-circle { border: 4px solid #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body>
    <div class="glass">
        <!-- رابط الصورة الخاص بكِ دكتورة -->
        <img src="https://raw.githubusercontent.com/zainab-abdullah33-bit/ZAW_Lab/main/dr_zainab.jpg" 
             class="w-32 h-32 rounded-full mx-auto mb-4 gold-circle object-cover" alt="Dr. Zainab">
        
        <h1 class="text-2xl font-bold text-yellow-400 mb-2">ZAW Research Hub</h1>
        <p class="text-sm mb-6 text-slate-300">بوابة الباحثين المتطورة لنتائج PDB و GROMACS</p>

        <div class="space-y-4 text-right">
            <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-yellow-400 outline-none">
            <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-yellow-400 outline-none">
            <button onclick="register()" class="w-full bg-yellow-500 text-slate-900 font-bold py-3 rounded-xl hover:bg-yellow-600 transition shadow-lg mt-2">إنشاء حساب باحث جديد</button>
            <p id="status" class="text-center mt-4 text-xs font-bold"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // تم تصحيح المفتاح هنا بدقة
        const firebaseConfig = {
            apiKey: "AIzaSyAqc7a5CRtjMRmuBwPWC5TXWMQkMGIlQuQ",
            authDomain: "zaw-research-hub.firebaseapp.com",
            projectId: "zaw-research-hub",
            storageBucket: "zaw-research-hub.firebasestorage.app",
            messagingSenderId: "750460537109",
            appId: "1:750460537109:web:687d785a83a3c8d2d2011c",
            measurementId: "G-F95MJ5EQGX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.register = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            if (!email || !password) {
                status.innerText = "❌ يرجى ملء كافة الحقول";
                status.style.color = "#f87171";
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                status.innerText = "✅ تم تسجيلكِ بنجاح في مختبر ZAW!";
                status.style.color = "#4ade80";
            } catch (e) {
                status.innerText = "❌ " + e.message;
                status.style.color = "#f87171";
            }
        };
    </script>
</body>
</html>
