<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة ZAW الدولية للبحث العلمي</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; border: 2px solid #D4AF37; border-radius: 15px; padding: 20px; max-width: 450px; margin: 10px auto; }
        input { width: 80%; padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        .btn { background: #2563eb; color: white; padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; width: 90%; }
        #wall { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: right; border: 1px solid #444; }
        .post { border-bottom: 1px solid #444; padding: 8px; margin-bottom: 5px; }
    </style>
</head>
<body onload="loadData()">

    <div class="card">
        <h2 style="color:#D4AF37;">🧬 دكتورة زينب عبد الله وحيد</h2>
        <p>مركز القيادة العلمية والتعاون الدولي</p>
    </div>

    <div class="card">
        <h3>📢 جدار التعاون الدولي (بث مباشر)</h3>
        <input type="text" id="user" placeholder="الاسم (مثلاً: د. زينب)">
        <input type="text" id="msg" placeholder="الموضوع (مثلاً: Bacteria)">
        <button onclick="sendData()" class="btn">نشر الإشعار العلمي الآن 🚀</button>
        <div id="wall">جاري تحديث البيانات من السحابة...</div>
    </div>

    <div class="card">
        <h3>🏛️ القاعات المرئية</h3>
        <a href="https://meet.jit.si/ZAW_Conference" style="color:#D4AF37; text-decoration:none; display:block; margin:5px;">🏛️ دخول قاعة المؤتمرات الكبرى</a>
        <a href="https://meet.jit.si/ZAW_Microbiology" style="color:#2563eb; text-decoration:none; display:block; margin:5px;">🧫 مختبر الأحياء المجهرية</a>
    </div>

    <script>
        // الرابط المباشر والقوي مع إضافة مفتاح الحفظ
        const dbURL = "https://zaw-research-hub-default-rtdb.firebaseio.com/posts.json";

        async function sendData() {
            const u = document.getElementById('user').value || "باحث";
            const m = document.getElementById('msg').value;
            if(!m) return;
            
            try {
                await fetch(dbURL, {
                    method: 'POST',
                    body: JSON.stringify({ name: u, msg: m, time: new Date().toLocaleTimeString('ar-EG') })
                });
                document.getElementById('msg').value = "";
                loadData();
            } catch(e) { alert("تأكدي من الإنترنت يا دكتورة"); }
        }

        async function loadData() {
            const wall = document.getElementById('wall');
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                wall.innerHTML = "";
                if(data) {
                    Object.values(data).reverse().forEach(p => {
                        wall.innerHTML += <div class="post"><b>${p.name}:</b> ${p.msg} <br><small style="color:#D4AF37">${p.time}</small></div>;
                    });
                } else { wall.innerHTML = "الجدار بانتظار أول منشور علمي."; }
            } catch(e) { wall.innerHTML = "بانتظار استجابة السحابة..."; }
        }
        setInterval(loadData, 3000); // تحديث كل 3 ثوانٍ ليكون "مثل التطبيق"
    </script>
</body>
</html>
