<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة ZAW الدولية</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; border: 2px solid #D4AF37; border-radius: 15px; padding: 20px; max-width: 450px; margin: 10px auto; }
        .btn { display: block; width: 90%; padding: 15px; margin: 10px auto; border-radius: 10px; text-decoration: none; font-weight: bold; color: white; }
        .blue { background: #2563eb; } .green { background: #10b981; } .purple { background: #8b5cf6; }
        #wall { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 10px; text-align: right; border: 1px solid #444; }
        input { width: 85%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body onload="loadData()">
    <div class="card">
        <h2 style="color:#D4AF37;">👤 دكتورة زينب عبد الله وحيد</h2>
        <p>مرحباً بكِ في منصة التعاون العلمي</p>
    </div>

    <div class="card">
        <h3>📢 جدار الطلبات العلمية</h3>
        <input type="text" id="msg" placeholder="اكتبي هنا (مثلاً: bacteria)...">
        <button onclick="sendData()" class="btn blue" style="border:none; cursor:pointer;">نشر الإشعار العلمي الآن 🚀</button>
        <div id="wall">جاري الاتصال بالسحابة...</div>
    </div>

    <div class="card">
        <h3>🏛️ القاعات المختبرية</h3>
        <a href="https://meet.jit.si/ZAW_Conference" class="btn blue">🏛️ قاعة المؤتمرات</a>
        <a href="https://meet.jit.si/ZAW_Microbiology" class="btn purple">🧫 مختبر الأحياء المجهرية</a>
        <a href="https://meet.jit.si/ZAW_Chat" class="btn green">💬 غرف الدردشة العلمية</a>
    </div>

    <script>
        // الرابط المباشر مع تصحيح الصيغة
        const url = const url = "https://zaw-research-hub-default-rtdb.firebaseio.com/posts.json?print=pretty";
        async function sendData() {
            const m = document.getElementById('msg').value;
            if(!m) return;
            await fetch(url, { method: 'POST', body: JSON.stringify({ name: "د. زينب", msg: m, time: new Date().toLocaleTimeString() }) });
            document.getElementById('msg').value = "";
            loadData();
        }

        async function loadData() {
            const wall = document.getElementById('wall');
            try {
                const res = await fetch(url);
                const data = await res.json();
                wall.innerHTML = "";
                if(data) {
                    Object.values(data).reverse().forEach(p => {
                        wall.innerHTML += <div style="border-bottom:1px solid #444; padding:5px;"><b>${p.name}:</b> ${p.msg} <br><small style="color:#D4AF37">${p.time}</small></div>;
                    });
                } else { wall.innerHTML = "الجدار فارغ، ابدئي بالنشر."; }
            } catch(e) { wall.innerHTML = "خطأ في الاتصال بالسحابة."; }
        }
        setInterval(loadData, 5000);
    </script>
</body>
</html>
