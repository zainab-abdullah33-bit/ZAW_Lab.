<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ZAW الدولية للبحث العلمي</title>
    <!-- استيراد مكتبات Firebase الأساسية -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; padding: 10px; margin: 0; }
        .card { background: #1e293b; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h3 { color: var(--gold); border-bottom: 1px dashed #444; padding-bottom: 5px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; }
        .btn { width: 95%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; background: var(--blue); box-shadow: 0 4px #1a45a3; }
        #wall { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-top: 15px; text-align: right; min-height: 50px; border: 1px solid #444; }
        .post { background: #26354a; border-right: 5px solid var(--gold); padding: 10px; margin-bottom: 8px; border-radius: 5px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h2 style="color: var(--gold); margin-top:20px;">🧬 منصة ZAW للتعاون البحثي الدولي</h2>
    
    <div class="card">
        <h3 style="border:none;">👤 دكتورة زينب عبد الله وحيد</h3>
        <p style="font-size: 12px; margin:0;">مركز القيادة العلمية والتعاون الدولي</p>
    </div>

    <div class="card">
        <h3>📢 جدار التواصل الفوري (Live Wall)</h3>
        <input type="text" id="uName" placeholder="اكتبي اسمكِ دكتورة...">
        <input type="text" id="mInput" placeholder="اكتبي موضوع البحث (مثلاً: Bacteria)...">
        <button class="btn" onclick="sendToCloud()">نشر الإشعار العلمي الآن 🚀</button>
        <div id="wall">جاري الربط بالسحابة...</div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بكِ من الصورة
        const firebaseConfig = {
            apiKey: "AIzaSyAqc7a5CRtjMRmuBwPWC5TXWMQkMGIlQuQ",
            authDomain: "zaw-research-hub.firebaseapp.com",
            databaseURL: "https://zaw-research-hub-default-rtdb.firebaseio.com",
            projectId: "zaw-research-hub",
            storageBucket: "zaw-research-hub.firebasestorage.app",
            messagingSenderId: "750460537109",
            appId: "1:750460537109:web:687d785a83a3c8d2d2011c",
            measurementId: "G-F95MJ5EQGX"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // وظيفة الإرسال للسحابة
        function sendToCloud() {
            const name = document.getElementById('uName').value || "د. زينب وحيد";
            const msg = document.getElementById('mInput').value;
            if(!msg) return;

            db.ref("global_posts").push({
                u: name,
                m: msg,
                t: new Date().toLocaleTimeString('ar-EG')
            });
            document.getElementById('mInput').value = "";
        }

        // وظيفة الاستماع للبث المباشر (تحديث تلقائي فور وصول رسالة)
        db.ref("global_posts").on("value", (snapshot) => {
            const wall = document.getElementById('wall');
            wall.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.values(data).reverse().forEach(p => {
                    wall.innerHTML += <div class="post"><b>${p.u}</b>: ${p.m} <br><small style="color:var(--gold); font-size:10px;">${p.t}</small></div>;
                });
            } else {
                wall.innerHTML = "الجدار بانتظار أول منشور علمي عالمي.";
            }
        });
    </script>
</body>
</html>
