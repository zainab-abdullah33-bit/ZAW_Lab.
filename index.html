<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التعاون البحثي الدولي</title>
    <!-- محرك خفيف جداً للربط -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 15px; }
        .card { background: #1e293b; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .btn:active { transform: translateY(2px); filter: brightness(1.2); }
        #wall { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 15px; text-align: right; border: 1px solid #444; min-height: 100px; max-height: 300px; overflow-y: auto; }
        .post { background: #26354a; border-right: 5px solid var(--gold); padding: 12px; margin-bottom: 10px; border-radius: 8px; font-size: 14px; }
        #profileDisplay { display: none; background: rgba(212, 175, 55, 0.1); border: 2px dashed var(--gold); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body onload="initSystem()">

    <h2 style="color: var(--gold);">🧬 منصة التعاون البحثي الدولي</h2>

    <!-- الملف الشخصي المحفوظ -->
    <div id="profileDisplay" class="card">
        <h3 style="margin:0">👤 ملف الباحثة: <span id="savedName" style="color:var(--gold)"></span></h3>
        <p id="savedBio" style="opacity: 0.8; margin: 5px 0;"></p>
        <button class="btn btn-blue" style="width:auto; padding:5px 15px; font-size:12px;" onclick="clearData()">تغيير الحساب</button>
    </div>

    <!-- إنشاء الحساب (يظهر مرة واحدة) -->
    <div class="card" id="loginCard">
        <h3>🔐 إنشاء الملف الأكاديمي</h3>
        <input type="text" id="uName" placeholder="الاسم الكامل...">
        <input type="text" id="uBio" placeholder="التخصص...">
        <button class="btn" onclick="saveData()">حفظ البيانات للأبد ✅</button>
    </div>

    <!-- جدار التعاون العالمي -->
    <div class="card">
        <h3>📢 جدار التعاون (عالمي)</h3>
        <input type="text" id="postMsg" placeholder="اكتبي طلبكِ البحثي...">
        <button class="btn btn-blue" onclick="publishPost()">نشر للعالم 🚀</button>
        <button class="btn" style="background:#475569; color:white; font-size:13px;" onclick="loadPosts()">تحديث الجدار لرؤية منشورات الزملاء 🔄</button>
        <div id="wall">اضغطي "تحديث" لرؤية المنشورات...</div>
    </div>

    <script>
        // إعدادات القاعدة (نسخة خفيفة)
        const config = { databaseURL: "https://zaw-platform-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        function saveData() {
            const n = document.getElementById('uName').value;
            const b = document.getElementById('uBio').value;
            if(n && b) {
                localStorage.setItem('dr_n', n);
                localStorage.setItem('dr_b', b);
                location.reload();
            }
        }

        function initSystem() {
            const n = localStorage.getItem('dr_n');
            const b = localStorage.getItem('dr_b');
            if(n) {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('profileDisplay').style.display = 'block';
                document.getElementById('savedName').innerText = n;
                document.getElementById('savedBio').innerText = b;
                loadPosts(); // تحميل المنشورات تلقائياً عند الفتح
            }
        }

        function publishPost() {
            const name = localStorage.getItem('dr_n');
            const msg = document.getElementById('postMsg').value;
            if(!name) return alert("سجلي أولاً");
            if(!msg) return;

            db.ref('research_posts').push({
                u: name,
                m: msg,
                t: new Date().toLocaleTimeString('ar-EG')
            }).then(() => {
                document.getElementById('postMsg').value = "";
                loadPosts();
            });
        }

        function loadPosts() {
            const wall = document.getElementById('wall');
            wall.innerHTML = "جاري جلب المنشورات...";
            
            db.ref('research_posts').limitToLast(15).once('value', (s) => {
                wall.innerHTML = "";
                const data = s.val();
                if(data) {
                    Object.values(data).reverse().forEach(p => {
                        const d = document.createElement('div');
                        d.className = 'post';
                        d.innerHTML = <b>${p.u}</b>: ${p.m} <br><small style="color:var(--gold)">${p.t}</small>;
                        wall.appendChild(d);
                    });
                } else {
                    wall.innerHTML = "لا توجد منشورات حالياً.";
                }
            });
        }

        function clearData() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
