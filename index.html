<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Research Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --blue: #1e88e5; --dark: #1A2634; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 85%; padding: 15px; border-radius: 10px; border: none; margin: 10px 0; font-size: 16px; font-family: 'Cairo'; }
        .btn { padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 90%; border: none; font-size: 16px; font-family: 'Cairo'; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; margin-top: 15px; }
        #collabList { margin-top: 20px; text-align: right; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; }
        .collab-item { border-bottom: 1px solid var(--gold); padding: 10px; margin-bottom: 5px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1 style="color: var(--gold);">منصة ZAW العالمية</h1>

    <!-- قسم التعاون -->
    <div class="card">
        <h3>🤝 طلب تعاون بحثي جديد</h3>
        <input type="text" id="nameIn" placeholder="اسم الباحث / Researcher Name">
        <input type="text" id="topicIn" placeholder="موضوع البحث / Research Topic">
        <button class="btn btn-gold" id="postBtn" onclick="executePost()">نشر طلب التعاون الآن</button>
        
        <div id="collabList">
            <p style="text-align:center; color: #aaa;">الطلبات النشطة ستظهر هنا</p>
        </div>
    </div>

    <!-- قسم البحث العالمي -->
    <div class="card">
        <h3>🔍 محرك البحث الأكاديمي العالمي</h3>
        <input type="text" id="searchQuery" placeholder="ادخل الكلمات المفتاحية للبحث...">
        <button class="btn btn-blue" id="searchBtn" onclick="executeSearch()">بحث في المجلات الرصينة 🔎</button>
    </div>

    <script>
        // وظيفة النشر
        function executePost() {
            const name = document.getElementById('nameIn').value;
            const topic = document.getElementById('topicIn').value;
            const list = document.getElementById('collabList');

            if (name && topic) {
                // إزالة رسالة "لا توجد طلبات"
                if (list.innerHTML.includes("الطلبات النشطة")) list.innerHTML = "";

                const div = document.createElement('div');
                div.className = 'collab-item';
                div.innerHTML = <strong>👤 الباحث:</strong> ${name}<br><strong>🧬 التخصص:</strong> ${topic};
                list.prepend(div);
                
                alert("تم النشر بنجاح دكتورة زينب! ✅");
                document.getElementById('nameIn').value = "";
                document.getElementById('topicIn').value = "";
            } else {
                alert("لطفاً، املئي الحقول أولاً دكتورة.");
            }
        }

        // وظيفة البحث
        function executeSearch() {
            const query = document.getElementById('searchQuery').value;
            if (query) {
                const url = "https://scholar.google.com/scholar?q=" + encodeURIComponent(query);
                window.open(url, '_blank');
            } else {
                alert("اكتبي شيئاً للبحث عنه أولاً.");
            }
        }
    </script>

</body>
</html>
