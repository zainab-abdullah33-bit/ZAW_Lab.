<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التعاون البحثي الدولي - ZAW</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #1e293b; border: 1.5px solid var(--gold); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2, h3 { color: var(--gold); margin: 0 0 10px 0; font-size: 1.1em; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; font-family: 'Segoe UI'; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        
        /* جدار التعاون */
        #wall { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 10px; max-height: 250px; overflow-y: auto; text-align: right; border: 1px solid #334155; }
        .post { background: #26354a; border-right: 4px solid var(--gold); padding: 10px; margin-bottom: 8px; border-radius: 5px; font-size: 13px; }
        .post b { color: var(--gold); }
    </style>
</head>
<body onload="startSystem()">

    <div class="container">
        <h2 style="text-align: center; font-size: 1.4em;">🧬 منصة التعاون البحثي الدولي</h2>

        <!-- 1. الهوية العلمية -->
        <div class="card">
            <h3>👤 ملف الباحث</h3>
            <input type="text" id="uName" placeholder="الاسم الكامل...">
            <input type="text" id="uBio" placeholder="التخصص...">
            <button class="btn btn-gold" onclick="saveMe()">تفعيل وحفظ الحساب ✅</button>
            <p id="st" style="font-size: 11px; color: #10b981; margin-top: 5px;"></p>
        </div>

        <!-- 2. جدار التعاون العالمي -->
        <div class="card">
            <h3>📢 جدار التعاون (مباشر)</h3>
            <input type="text" id="msg" placeholder="اكتبي طلب تعاون أو رسالة للزملاء...">
            <button class="btn btn-blue" onclick="sendMsg()">نشر الإشعار للعالم 🚀</button>
            <div id="wall">جاري تحميل المنشورات...</div>
        </div>

        <!-- 3. البحث العلمي -->
        <div class="card">
            <h3>🔍 البحث في المجلات الرصينة</h3>
            <input type="text" id="sq" placeholder="موضوع البحث...">
            <button class="btn btn-blue" onclick="var q=document.getElementById('sq').value; if(q) window.open('https://scholar.google.com/scholar?q='+encodeURIComponent(q));">بحث سريع 🔎</button>
        </div>

        <!-- 4. قاعة المؤتمرات -->
        <div class="card" style="border-color: var(--blue);">
            <h3>🏛️ القاعة والاجتماعات</h3>
            <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Conference_2026')">دخول القاعة (فيديو) 📹</button>
        </div>
    </div>

    <script>
        // إعداد الربط العالمي
        const config = { databaseURL: "https://zaw-platform-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function saveMe() {
            const n = document.getElementById('uName').value;
            const b = document.getElementById('uBio').value;
            if(n && b) {
                localStorage.setItem('zn', n);
                localStorage.setItem('zb', b);
                document.getElementById('st').innerText = "أهلاً بكِ دكتورة " + n;
                alert("تم التفعيل!");
            }
        }

        function sendMsg() {
            const n = localStorage.getItem('zn');
            const b = localStorage.getItem('zb');
            const m = document.getElementById('msg').value;
            if(!n) return alert("سجلي اسمكِ أولاً دكتورة.");
            if(!m) return alert("اكتبي شيئاً للنشر.");
            
            db.ref('posts').push({ n: n, b: b, m: m, t: new Date().toLocaleTimeString('ar-EG') });
            document.getElementById('msg').value = "";
        }

        function startSystem() {
            // استرجاع البيانات
            if(localStorage.getItem('zn')) {
                document.getElementById('uName').value = localStorage.getItem('zn');
                document.getElementById('uBio').value = localStorage.getItem('zb');
                document.getElementById('st').innerText = "مرحباً بكِ مجدداً دكتورة " + localStorage.getItem('zn');
            }

            // تحديث الجدار فوراً عند وصول أي منشور جديد من العالم
            db.ref('posts').limitToLast(15).on('value', (snap) => {
                const wall = document.getElementById('wall');
                wall.innerHTML = "";
                const data = snap.val();
                if(!data) { wall.innerHTML = "لا توجد منشورات بعد."; return; }
                
                Object.values(data).reverse().forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'post';
                    d.innerHTML = <b>${p.n}</b> (${p.b}):<br>${p.m}<br><small style="font-size:9px; color:var(--gold)">${p.t}</small>;
                    wall.appendChild(d);
                });
            });
        }
    </script>
</body>
</html>
