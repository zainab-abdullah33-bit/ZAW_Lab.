<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التعاون البحثي الدولي</title>
    <!-- الربط السحابي المباشر -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; padding: 10px; }
        .card { background: #1e293b; border: 1.5px solid var(--gold); border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 450px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        #wall { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; margin-top: 10px; max-height: 300px; overflow-y: auto; text-align: right; border: 1px solid #334155; }
        .post { background: #26354a; border-right: 4px solid var(--gold); padding: 10px; margin-bottom: 8px; border-radius: 5px; font-size: 13px; }
    </style>
</head>
<body onload="startGlobalHub()">

    <h2>🧬 منصة التعاون البحثي الدولي</h2>

    <div class="card">
        <h3>👤 ملف الباحث</h3>
        <input type="text" id="uN" placeholder="الاسم الكامل...">
        <input type="text" id="uB" placeholder="التخصص...">
        <button class="btn btn-gold" onclick="saveProfile()">تفعيل الحساب ✅</button>
    </div>

    <div class="card">
        <h3>📢 جدار التعاون العالمي (مباشر)</h3>
        <input type="text" id="msg" placeholder="اكتبي رسالتكِ للعالم...">
        <button class="btn btn-blue" onclick="publish()">نشر الإشعار للجميع 🚀</button>
        <div id="wall">بانتظار المنشورات...</div>
    </div>

    <div class="card">
        <h3>🏛️ القاعة الافتراضية</h3>
        <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Conference_2026')">دخول القاعة 📹</button>
    </div>

    <script>
        // إعدادات الربط العالمي (Firebase)
        const config = { databaseURL: "https://zaw-platform-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.database();

        function saveProfile() {
            const n = document.getElementById('uN').value;
            const b = document.getElementById('uB').value;
            if(n) { localStorage.setItem('zn', n); localStorage.setItem('zb', b); alert("تم التفعيل!"); }
        }

        function publish() {
            const n = localStorage.getItem('zn') || "باحث مجهول";
            const m = document.getElementById('msg').value;
            if(!m) return;
            // إرسال للمشتركين في العالم
            db.ref('global_posts').push({ name: n, text: m, time: new Date().toLocaleTimeString() });
            document.getElementById('msg').value = "";
        }

        function startGlobalHub() {
            // استرجاع البيانات المحفوظة
            document.getElementById('uN').value = localStorage.getItem('zn') || "";
            document.getElementById('uB').value = localStorage.getItem('zb') || "";

            // مراقبة الجدار (أي شخص ينشر يظهر عند الجميع فوراً)
            db.ref('global_posts').limitToLast(10).on('value', (snap) => {
                const wall = document.getElementById('wall');
                wall.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).reverse().forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'post';
                        div.innerHTML = <b>${p.name}</b>: ${p.text} <br><small style="color:var(--gold)">${p.time}</small>;
                        wall.appendChild(div);
                    });
                    
                    // إرسال تنبيه للمتصفح إذا وصل منشور جديد
                    if(Notification.permission === "granted") {
                        new Notification("منصة ZAW: منشور جديد!");
                    }
                }
            });
            
            // طلب إذن التنبيهات
            if (Notification.permission !== "granted") Notification.requestPermission();
        }
    </script>
</body>
</html>
