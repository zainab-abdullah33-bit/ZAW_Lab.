<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة التعاون البحثي الدولي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; border: 2px solid #D4AF37; border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 500px; }
        h1 { color: #D4AF37; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        .btn { width: 90%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 17px; margin: 5px 0; }
        .btn-gold { background: #D4AF37; color: black; }
        .btn-blue { background: #2563eb; color: white; }
        #resDisplay { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-top: 10px; border-right: 5px solid #D4AF37; text-align: right; }
    </style>
</head>
<body>

    <h1>🧬 منصة التعاون البحثي الدولي</h1>

    <!-- 1. ملف الباحث - مفعل ومباشر -->
    <div class="box">
        <h3>👤 ملف الباحث الشخصي</h3>
        <input type="text" id="n1" placeholder="اكتبي اسمكِ الكامل هنا...">
        <input type="text" id="b1" placeholder="تخصصكِ الدقيق...">
        <button class="btn btn-gold" onclick="localStorage.setItem('name', document.getElementById('n1').value); localStorage.setItem('bio', document.getElementById('b1').value); alert('تم حفظ ملفكِ بنجاح دكتورة!'); location.reload();">
            تفعيل وحفظ ملفي الشخصي ✅
        </button>
        <div id="resDisplay">
            <script>
                var n = localStorage.getItem('name') || "لم يتم التسجيل";
                var b = localStorage.getItem('bio') || "زائر";
                document.write("<b>الباحث:</b> " + n + "<br><b>التخصص:</b> " + b);
            </script>
        </div>
    </div>

    <!-- 2. البحث العلمي - مفعل برابط مباشر -->
    <div class="box">
        <h3>🔍 محرك البحث الأكاديمي</h3>
        <input type="text" id="searchBox" placeholder="موضوع البحث...">
        <button class="btn btn-blue" onclick="var q = document.getElementById('searchBox').value; if(q) { window.open('https://scholar.google.com/scholar?q=' + encodeURIComponent(q), '_blank'); } else { alert('يرجى كتابة موضوع البحث أولاً'); }">
            تشغيل محرك البحث الآن 🔎
        </button>
    </div>

    <!-- 3. قاعة الاجتماعات - مفعلة برابط مباشر -->
    <div class="box">
        <h3>🏛️ قاعة الاجتماعات الدولية</h3>
        <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Research_2026', '_blank')">
            دخول القاعة (فيديو) 📹
        </button>
    </div>

    <p style="font-size: 12px; color: #64748b;">بوابة الأستاذة الدكتورة زينب عبدالله وحيد</p>

</body>
</html>
