<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Global Academic Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-blue: #1A2634; --white: #FFFFFF; --gray: #f4f4f4; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-blue); color: var(--white); margin: 0; }
        
        .navbar { background: rgba(255,255,255,0.05); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(to bottom, #1A2634, #2c3e50); }
        
        /* قسم رفع البحوث العام */
        .upload-section { max-width: 800px; margin: -50px auto 40px; background: white; color: #333; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--dark-blue); }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; }
        
        .btn-upload { background: var(--gold); color: var(--dark-blue); border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; margin-top: 10px; }
        
        .categories-nav { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
        .cat-tag { background: rgba(212, 175, 55, 0.2); color: var(--gold); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <nav class="navbar">
        <h2 style="color: var(--gold); margin: 0;">ZAW Academic Hub 🌐</h2>
        <div>
            <span>مرحباً، د. زينب عبدالله وحيد</span>
        </div>
    </nav>

    <div class="hero">
        <h1>منصة التعاون العلمي والبحثي الشاملة</h1>
        <p>مساحة الأكاديميين لمشاركة البحوث، البيانات، والخبرات عبر التخصصات</p>
    </div>

    <div class="upload-section">
        <h3 style="text-align: center; color: var(--dark-blue);">إضافة نتاج علمي جديد 📤</h3>
        
        <div class="form-group">
            <label>عنوان البحث أو مجموعة البيانات:</label>
            <input type="text" id="researchTitle" placeholder="أدخل عنوان نتاجك العلمي هنا...">
        </div>

        <div class="form-group">
            <label>التخصص العام:</label>
            <select id="category">
                <option>علوم طبية وصيدلانية</option>
                <option>هندسة وتقنيات</option>
                <option>علوم صرفة (كيمياء، فيزياء، أحياء)</option>
                <option>علوم إنسانية واجتماعية</option>
                <option>فنون وعمارة</option>
                <option>قانون وعلوم سياسية</option>
            </select>
        </div>

        <div class="form-group">
            <label>نوع الملف:</label>
            <div style="display: flex; gap: 20px;">
                <label style="font-weight: normal;"><input type="radio" name="filetype"> بحث منشور (PDF)</label>
                <label style="font-weight: normal;"><input type="radio" name="filetype"> بيانات خام (Dataset)</label>
                <label style="font-weight: normal;"><input type="radio" name="filetype"> سيرة ذاتية (CV)</label>
            </div>
        </div>

        <div class="form-group">
            <label>اختر الملف:</label>
            <input type="file" style="border: none;">
        </div>

        <button class="btn-upload" onclick="publish()">نشر وتوثيق النتاج العلمي ✨</button>
    </div>

    <div style="text-align: center; padding: 20px;">
        <h2 style="color: var(--gold);">تصفح البحوث حسب التخصص</h2>
        <div class="categories-nav">
            <span class="cat-tag">كل البحوث</span>
            <span class="cat-tag">الطبية</span>
            <span class="cat-tag">الهندسية</span>
            <span class="cat-tag">الإنسانية</span>
            <span class="cat-tag">الزراعية</span>
        </div>
    </div>

    <script>
        function publish() {
            const title = document.getElementById('researchTitle').value;
            if(title) {
                alert("دكتورة زينب، سيتم الآن رفع '" + title + "' وتوثيقه باسمكِ في قاعدة البيانات العالمية للمنصة.");
            } else {
                alert("يرجى إدخال عنوان البحث أولاً.");
            }
        }
    </script>

</body>
</html>
