<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التعاون البحثي الدولي</title>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Arial', sans-serif; background: var(--dark); color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 450px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: #0f172a; color: white; }
        .btn { width: 95%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin: 10px 0; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .btn:active { transform: scale(0.95); background: #fff; }
        #wall { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; margin-top: 15px; text-align: right; min-height: 50px; border: 1px solid #334155; }
        .post { background: #26354a; border-right: 5px solid var(--gold); padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold);">🧬 منصة التعاون البحثي الدولي</h1>

    <div class="card">
        <h3>👤 ملف الباحث</h3>
        <input type="text" id="nameIn" placeholder="اسمكِ الكامل...">
        <input type="text" id="bioIn" placeholder="تخصصكِ...">
        <button class="btn btn-gold" onclick="saveProfile()">حفظ البيانات وتفعيل الأزرار ✅</button>
    </div>

    <div class="card">
        <h3>📢 جدار التعاون</h3>
        <input type="text" id="msgIn" placeholder="اكتبي طلب التعاون هنا...">
        <button class="btn btn-blue" onclick="postMsg()">نشر المنشور الآن 🚀</button>
        <div id="wall">المنشورات تظهر هنا...</div>
    </div>

    <div class="card">
        <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Global_Room', '_blank')">دخول قاعة المؤتمرات 📹</button>
    </div>

    <script>
        // وظيفة الحفظ
        function saveProfile() {
            const n = document.getElementById('nameIn').value;
            const b = document.getElementById('bioIn').value;
            if(n && b) {
                localStorage.setItem('user_n', n);
                localStorage.setItem('user_b', b);
                alert("تم التفعيل بنجاح دكتورة " + n + "! الأزرار الآن تعمل.");
            } else {
                alert("يرجى إكمال البيانات أولاً.");
            }
        }

        // وظيفة النشر (داخلية وسريعة)
        function postMsg() {
            const n = localStorage.getItem('user_n');
            const m = document.getElementById('msgIn').value;
            if(!n) { alert("سجلي اسمكِ أولاً دكتورة!"); return; }
            if(!m) return;

            const wall = document.getElementById('wall');
            const div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = "<b>" + n + "</b>: " + m;
            wall.prepend(div);
            document.getElementById('msgIn').value = "";
        }
    </script>
</body>
</html>
