<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ZAW الدولية للبحث العلمي</title>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; text-align: center; padding: 10px; margin: 0; }
        .card { background: #1e293b; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h3 { color: var(--gold); margin: 10px 0; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; }
        .btn { width: 95%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; margin: 5px 0; transition: 0.2s; color: white; display: inline-block; text-decoration: none; }
        .btn-blue { background: var(--blue); box-shadow: 0 4px #1a45a3; }
        .btn-green { background: #10b981; } .btn-special { background: #8b5cf6; }
        #wall { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 15px; text-align: right; min-height: 100px; border: 1px solid #444; }
        .post { background: #26354a; border-right: 4px solid var(--gold); padding: 10px; margin-bottom: 8px; border-radius: 5px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="startLiveWall()">

    <h2 style="color: var(--gold); margin-top:20px;">🧬 منصة ZAW للتعاون البحثي الدولي</h2>
    
    <div class="card" style="background: rgba(212, 175, 55, 0.1);">
        <h3 style="border:none;">👤 دكتورة زينب عبد الله وحيد</h3>
        <p style="font-size: 12px; margin:0;">مركز القيادة العلمية والتعاون الدولي</p>
    </div>

    <!-- جدار التعاون الفوري -->
    <div class="card">
        <h3>📢 جدار طلبات التعاون العلمي (فوري)</h3>
        <input type="text" id="uName" placeholder="اكتبي اسمكِ أو اسم الباحث...">
        <input type="text" id="mInput" placeholder="اكتبي موضوع البحث (مثلاً: Bacteria)...">
        <button class="btn btn-blue" onclick="sendToCloud()">نشر الإشعار العلمي الآن 🚀</button>
        <div id="wall">جاري الربط مع السحابة الدولية...</div>
    </div>

    <!-- القاعات والمختبرات -->
    <div class="card">
        <h3>🏛️ القاعات والمختبرات المرئية</h3>
        <a href="https://meet.jit.si/ZAW_Conference" target="_blank" class="btn btn-blue">🏛️ قاعة المؤتمرات الكبرى</a>
        <a href="https://meet.jit.si/ZAW_Microbiology" target="_blank" class="btn btn-special">🧫 قسم الأحياء المجهرية</a>
        <a href="https://meet.jit.si/ZAW_Chat" target="_blank" class="btn btn-green">💬 غرف الدردشة العلمية</a>
    </div>

    <script>
        // الرابط المباشر والقوي للسحابة
        const dbURL = "https://zaw-research-hub-default-rtdb.firebaseio.com/research.json";

        async function sendToCloud() {
            const name = document.getElementById('uName').value || "باحث دولي";
            const msg = document.getElementById('mInput').value;
            if(!msg) return;

            const data = { 
                u: name, 
                m: msg, 
                t: new Date().toLocaleTimeString('ar-EG') 
            };
            
            try {
                await fetch(dbURL, { method: 'POST', body: JSON.stringify(data) });
                document.getElementById('mInput').value = "";
                startLiveWall(); // تحديث فوري بعد النشر
            } catch(e) { console.error("Error sending data"); }
        }

        async function startLiveWall() {
            const wall = document.getElementById('wall');
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                wall.innerHTML = "";
                if(data) {
                    // تحويل البيانات وعرضها من الأحدث للأقدم
                    Object.values(data).reverse().forEach(p => {
                        const d = document.createElement('div');
                        d.className = 'post';
                        d.innerHTML = <b>${p.u}</b>: ${p.m} <br><small style="color:var(--gold); font-size:10px;">${p.t}</small>;
                        wall.appendChild(d);
                    });
                } else {
                    wall.innerHTML = "الجدار جاهز لاستقبال أول تعاون بحثي.";
                }
            } catch(e) { wall.innerHTML = "تنبيه: بانتظار استجابة السحابة..."; }
        }

        // التحديث التلقائي كل 5 ثوانٍ ليكون "مثل التطبيق"
        setInterval(startLiveWall, 5000);
    </script>
</body>
</html>
