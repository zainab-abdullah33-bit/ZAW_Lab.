<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ZAW للتعاون العلمي</title>
    <!-- مكتبات سريعة جداً ومضادة للتجمد -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; padding: 15px; }
        .card { background: #1e293b; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; max-width: 450px; margin: 15px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; background: var(--blue); color: white; margin-top: 10px; }
        .btn:active { transform: scale(0.95); background: var(--gold); color: black; }
        #wall { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 20px; text-align: right; min-height: 100px; border: 1px solid #444; }
        .post { background: #26354a; border-right: 5px solid var(--gold); padding: 12px; margin-bottom: 10px; border-radius: 8px; font-size: 14px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="connectZAW()">

    <h2 style="color: var(--gold);">🧬 منصة ZAW للتعاون البحثي الدولي</h2>
    
    <div class="card">
        <h3 style="margin-top:0;">👤 دكتورة زينب عبد الله وحيد</h3>
        <p style="font-size: 13px; opacity: 0.8;">المنصة الآن متصلة عالمياً 🌍</p>
    </div>

    <div class="card">
        <h3>📢 جدار التعاون العلمي</h3>
        <input type="text" id="scientificMsg" placeholder="اكتبي موضوع البحث هنا...">
        <button class="btn" onclick="sendToCloud()">نشر الإشعار الآن 🚀</button>
        <div id="wall">جاري فحص الاتصال بالقاعدة...</div>
    </div>

    <script>
        // الرابط الخاص بكِ دكتورة زينب من الصورة
        const firebaseConfig = {
            databaseURL: "https://zaw-research-hub-default-rtdb.firebaseio.com/"
        };

        // تفعيل الاتصال
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function connectZAW() {
            const wall = document.getElementById('wall');
            // جلب البيانات فوراً وتلقائياً
            database.ref('research_posts').on('value', (snapshot) => {
                wall.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.values(data).reverse().forEach(post => {
                        const div = document.createElement('div');
                        div.className = 'post';
                        div.innerHTML = <b>${post.user}</b>: ${post.msg}<br><small style="color:var(--gold)">${post.time}</small>;
                        wall.appendChild(div);
                    });
                } else {
                    wall.innerHTML = "الجدار فارغ.. ابدأي بنشر أول فكرة بحثية!";
                }
            }, (error) => {
                wall.innerHTML = "خطأ في الاتصال: تأكدي من ضغط Publish في Firebase";
            });
        }

        function sendToCloud() {
            const message = document.getElementById('scientificMsg').value;
            if (!message) return;

            database.ref('research_posts').push({
                user: "د. زينب وحيد",
                msg: message,
                time: new Date().toLocaleTimeString('ar-EG')
            }).then(() => {
                document.getElementById('scientificMsg').value = "";
            }).catch(err => {
                alert("فشل النشر! تأكدي أن القواعد (Rules) هي true");
            });
        }
    </script>
</body>
</html>
