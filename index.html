[5:27 م، 2026/4/5] زينب عبدالله: <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Research Hub | المنصة الدولية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-blue: #1A2634; --white: #FFFFFF; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-blue); color: var(--white); margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .researchers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 15px; border-top: 5px solid var(--gold); text-align: center; position: relative; }
        .tag { background: var(--gold); color: black; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        button { background: var(--gold); color: var(--dark-blue); border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-family: 'Cairo'; transition: 0.3s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        
        /* نافذة الإعدادات */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--dark-blue); margin: 10% auto; padding: 25px; border: 2px solid var(--gold); width: 350px; border-radius: 15px; text-align: center; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gold); background: none; color: white; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="welcome-msg">مرحباً بكِ د. زينب عبدالله 🧬</h2>
        <button style="width: auto; background: none; color: var(--gold); border: 1px solid var(--gold);" onclick="openSettings()">إعداداتي ⚙️</button>
    </div>

    <div class="researchers-grid">
        <!-- بطاقة د. زينب -->
        <div class="card">
            <span id="display-flag" style="position: absolute; top: 10px; left: 15px; font-size: 20px;">🇮🇶</span>
            <span class="tag">Molecular Biology</span>
            <h3 id="display-name">د. زينب عبدالله وحيد</h3>
            <p id="display-uni" style="font-size: 14px; color: #aaa;">جامعة التقنية الوسطى | MTU</p>
            <button onclick="openSettings()">تعديل الملف الشخصي</button>
        </div>

        <!-- باحث دولي -->
        <div class="card">
            <span style="position: absolute; top: 10px; left: 15px; font-size: 20px;">🇧🇷</span>
            <span class="tag">Toxoplasmosis Expert</span>
            <h3>د. ريكاردو سيلفا</h3>
            <p style="font-size: 14px; color: #aaa;">جامعة ساو باولو | البرازيل</p>
            <button style="background: none; border: 1px solid var(--gold); color: var(--gold);" onclick="sendCollab('د. ريكاردو سيلفا')">طلب تعاون بحثي</button>
        </div>
    </div>

    <!-- نافذة الإعدادات -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--gold);">تعديل البيانات</h3>
            <input type="text" id="in-name" placeholder="الاسم">
            <input type="text" id="in-uni" placeholder="الجامعة">
            <select id="in-country">
                <option value="🇮🇶">العراق 🇮🇶</option>
                <option value="🇧🇷">البرازيل 🇧🇷</option>
                <option value="🇲🇦">المغرب 🇲🇦</option>
            </select>
            <button onclick="saveSettings()">حفظ</button>
            <p style="color: red; cursor: pointer;" onclick="closeSettings()">إلغاء</p>
        </div>
    </div>

    <script>
        function openSettings() { document.getElementById('myModal').style.display = "block"; }
        function closeSettings() { document.getElementById('myModal').style.display = "none"; }
        
        function saveSettings() {
            document.getElementById('display-name').innerText = document.getElementById('in-name').value || "د. زينب عبدالله";
            document.getElementById('display-uni').innerText = document.getElementById('in-uni').value || "جامعة التقنية الوسطى";
            document.getElementById('display-flag').innerText = document.getElementById('in-country').value;
            document.getElementById('welcome-msg').innerText = "مرحباً بكِ " + document.getElementById('in-name').value;
            closeSettings();
            alert("✅ تم تحديث ملفكِ الأكاديمي بنجاح!");
        }

        function sendCollab(name) {
            alert("🚀 تم إرسال طلب تعاونكِ إلى " + name + " بنجاح. سيصلكِ رد على بريدكِ الجامعي قريباً!");
        }
    </script>
</body>
</html>
