<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Global Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --blue: #1e88e5; --dark: #1A2634; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); border: 1.5px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .btn { padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; border: none; margin-top: 10px; font-family: 'Cairo'; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: none; margin: 5px 0; font-family: 'Cairo'; }
        #collabList { text-align: right; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; max-height: 200px; overflow-y: auto; }
        .lang-btn { position: fixed; top: 10px; left: 10px; z-index: 1000; padding: 5px 15px; background: var(--gold); border-radius: 20px; cursor: pointer; border: none; font-weight: bold; }
        .en-text { display: none; }
    </style>
</head>
<body id="mainBody">

    <button class="lang-btn" onclick="changeLang()">English / عربي</button>

    <h1 style="color: var(--gold);" class="ar-text">منصة ZAW للتعاون البحثي العالمي</h1>
    <h1 style="color: var(--gold); display:none" class="en-text">ZAW Global Research Collaboration</h1>

    <!-- 1. مركز التعاون المفتوح (لكل الباحثين) -->
    <div class="card">
        <h2 class="ar-text">🤝 مركز طلبات التعاون البحثي</h2>
        <h2 class="en-text" style="display:none">🤝 Research Collaboration Center</h2>
        <p class="ar-text">أدخل بياناتك لفتح باب التعاون مع باحثين آخرين</p>
        
        <input type="text" id="researcherName" placeholder="اسم الباحث / Researcher Name">
        <input type="text" id="researchTopic" placeholder="موضوع البحث المقترح / Research Topic">
        <button class="btn btn-gold" onclick="postCollab()">نشر طلب تعاون / Post Request</button>
        
        <div id="collabList" style="margin-top: 15px;">
            <p style="font-size: 12px; color: var(--gold);">طلبات التعاون الحالية تظهر هنا..</p>
        </div>
    </div>

    <!-- 2. المكتبة العالمية -->
    <div class="card">
        <h2 class="ar-text">🌐 محرك البحث الأكاديمي العالمي</h2>
        <input type="text" id="searchBox" placeholder="ابحث في ملايين البحوث العالمية...">
        <button class="btn btn-blue" onclick="doSearch()">بحث في المجلات الرصينة 🔎</button>
    </div>

    <!-- 3. قاعة الاجتماعات -->
    <div class="card">
        <h2 class="ar-text">📡 عقد اجتماع بحثي فوري</h2>
        <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Global_Meeting', '_blank')">دخول القاعة الافتراضية 📹</button>
    </div>

    <script>
        // دالة نشر طلب التعاون
        function postCollab() {
            const name = document.getElementById('researcherName').value;
            const topic = document.getElementById('researchTopic').value;
            const list = document.getElementById('collabList');
            
            if(name && topic) {
                const item = document.createElement('div');
                item.style.borderBottom = "1px solid #444";
                item.style.padding = "10px";
                item.innerHTML = `<b>${name}:</b> يطلب تعاوناً في: <i>${topic}</i> 
                                <button onclick="window.open('https://meet.jit.si/ZAW_Collab_${name}','_blank')" 
                                style="background:var(--blue); color:white; border:none; padding:3px 8px; border-radius:5px; cursor:pointer; margin-right:10px;">انضمام للباحث</button>`;
                list.prepend(item);
                alert("تم نشر طلبك بنجاح دكتورة! ✅");
                document.getElementById('researcherName').value = "";
                document.getElementById('researchTopic').value = "";
            } else {
                alert("يرجى ملء البيانات أولاً");
            }
        }

        // دالة البحث العالمي
        function doSearch() {
            const q = document.getElementById('searchBox').value;
            if(q) {
                window.open(https://scholar.google.com/scholar?q=${q}, '_blank');
            }
        }

        // دالة اللغة
        function changeLang() {
            const body = document.getElementById('mainBody');
            const ar = document.querySelectorAll('.ar-text');
            const en = document.querySelectorAll('.en-text');
            
            if(body.dir === "rtl") {
                body.dir = "ltr";
                ar.forEach(el => el.style.display = 'none');
                en.forEach(el => el.style.display = 'block');
            } else {
                body.dir = "rtl";
                ar.forEach(el => el.style.display = 'block');
                en.forEach(el => el.style.display = 'none');
            }
        }
    </script>
</body>
</html>
