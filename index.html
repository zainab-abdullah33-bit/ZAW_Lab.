<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Research Hub | منصة الباحثين العالمية</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-blue: #0a192f;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-blue);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .hub-container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 15px;
        }
        h1 { color: var(--gold); font-size: 24px; margin-bottom: 5px; }
        p { color: #ccc; font-size: 14px; margin-bottom: 25px; }
        
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #888; transition: 0.3s; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #112240;
            color: white;
            box-sizing: border-box;
        }
        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: var(--dark-blue);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        
        #dashboard { display: none; }
        .upload-area {
            border: 2px dashed #333;
            padding: 30px;
            margin-top: 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <img src="dr_zainab.jpg" class="profile-img" alt="Dr. Zainab">
        <h1>ZAW Research Hub</h1>
        <p>بوابة الباحثين العلمية المتطورة</p>

        <!-- نظام التسجيل -->
        <div id="auth-section">
            <div class="auth-tabs">
                <div class="tab active" onclick="switchTab('login')">تسجيل الدخول</div>
                <div class="tab" onclick="switchTab('signup')">إنشاء حساب باحث</div>
            </div>

            <div id="login-form">
                <input type="email" placeholder="البريد الإلكتروني الجامعي">
                <input type="password" placeholder="كلمة المرور">
                <button class="btn-main" onclick="fakeLogin()">دخول للمنصة</button>
            </div>

            <div id="signup-form" style="display:none;">
                <input type="text" placeholder="الاسم الكامل بالإنجليزية">
                <input type="text" placeholder="الجامعة / المركز البحثي">
                <select>
                    <option>التخصص: بيولوجيا جزيئية</option>
                    <option>التخصص: كيمياء حيوية</option>
                    <option>التخصص: تقنيات طبية</option>
                    <option>تخصص آخر</option>
                </select>
                <input type="email" placeholder="البريد الإلكتروني">
                <input type="password" placeholder="كلمة مرور قوية">
                <button class="btn-main" onclick="fakeLogin()">إنشاء الحساب والبدء</button>
            </div>
        </div>

        <!-- لوحة التحكم (تظهر بعد الدخول) -->
        <div id="dashboard">
            <h2 style="color:var(--gold)">مرحباً بك في مختبرك الرقمي</h2>
            <p>يمكنك الآن رفع ملفات PDB أو نتائج GROMACS للمشاركة والتحليل</p>
            <div class="upload-area">
                <p>اسحب ملفات البحث هنا أو اضغط للرفع</p>
                <input type="file" id="fileUpload" style="display:none" onchange="alert('تم استلام الملف بنجاح في قاعدة بيانات Hub')">
                <button onclick="document.getElementById('fileUpload').click()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:5px; cursor:pointer;">اختيار ملف</button>
            </div>
            <button class="btn-main" style="background:#cc0000; color:white; margin-top:30px;" onclick="location.reload()">تسجيل الخروج</button>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab');
            if(type === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('signup-form').style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('signup-form').style.display = 'block';
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }

        function fakeLogin() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }
    </script>
</body>
</html>
