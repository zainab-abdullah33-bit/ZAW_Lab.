<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Global Hub | المنصة الأكاديمية</title>
    
    <!-- إعدادات التطبيق للموبايل -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ZAW Hub">
    <link rel="apple-touch-icon" href="zaw_profile.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-blue: #1A2634; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-blue); color: white; margin: 0; text-align: center; }
        
        /* زر تثبيت التطبيق */
        #installBanner { display: none; background: var(--gold); color: var(--dark-blue); padding: 15px; position: fixed; bottom: 0; width: 100%; font-weight: bold; cursor: pointer; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        
        .main-container { padding: 40px 20px; }
        .app-card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; border: 1px solid var(--gold); margin-top: 20px; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- بنر التثبيت يظهر لمستخدمي الأندرويد والمتصفحات الداعمة -->
    <div id="installBanner" onclick="installApp()">
        اضغطي هنا لتثبيت "منصة ZAW" على شاشة هاتفكِ 📱✨
    </div>

    <div class="main-container">
        <h1 style="color: var(--gold);">ZAW Academic Hub</h1>
        <div class="app-card">
            <img src="zaw_profile.jpg" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px;" onerror="this.src='https://via.placeholder.com/100/D4AF37/1A2634?text=ZAW'">
            <h2>مرحباً بكِ دكتورة زينب</h2>
            <p class="pulse">المنصة الآن جاهزة لتكون تطبيقكِ الخاص</p>
            
            <hr style="border: 0.5px solid rgba(212,175,55,0.3); margin: 20px 0;">
            
            <div style="text-align: right; font-size: 14px;">
                <p>✅ دعم كافة التخصصات العلمية</p>
                <p>✅ رفع البحوث والداتا (PDF/Excel)</p>
                <p>✅ تواصل دولي مباشر</p>
            </div>
        </div>
        
        <p style="margin-top: 30px; font-size: 13px; opacity: 0.7;">
            * لمستخدمي iPhone: اضغطي على زر "المشاركة" (Share) ثم اختاري "Add to Home Screen".
        </p>
    </div>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                }
                deferredPrompt = null;
                document.getElementById('installBanner').style.display = 'none';
            }
        }
    </script>
</body>
</html>
