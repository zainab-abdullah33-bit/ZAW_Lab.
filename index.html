<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Global Hub | المنصة الأكاديمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-blue: #1A2634; --white: #FFFFFF; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-blue); color: var(--white); margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; border: 1px solid var(--gold); }
        .btn { padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; border: none; font-family: 'Cairo'; display: block; text-decoration: none; }
        .btn-gold { background: var(--gold); color: var(--dark-blue); }
        .btn-blue { background: #1e88e5; color: white; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold);">مرحباً د. زينب عبدالله وحيد 🧬</h1>
    <p>جامعة التقنية الوسطى | منصة توثيق النتاج العلمي</p>

    <div class="grid">
        <!-- بطاقة د. ريكاردو -->
        <div class="card">
            <span style="float: left;">🇧🇷</span>
            <h3>د. ريكاردو سيلفا</h3>
            <p>خبير أبحاث البروتينات</p>
            <!-- وضعنا رابط إيميلك الحقيقي هنا دكتورة -->
            <a href="mailto:zainab.abdullah@mtu.edu.iq" class="btn btn-gold">مراسلة الباحث (عبر الإيميل) ✉️</a>
            <a href="https://meet.jit.si/ZAW_Ricardo_Meeting" target="_blank" class="btn btn-blue">عقد اجتماع مباشر 📹</a>
        </div>
        
        <!-- قسم البحوث والداتا (الخانات التي كانت جامدة) -->
        <div class="card">
            <span style="float: left;">📚</span>
            <h3>مستودع البحوث والداتا</h3>
            <p>انقر للوصول للنتاج العلمي</p>
            <!-- هنا نضع رابط أبحاثك المنشورة -->
            <a href="https://scholar.google.com" target="_blank" class="btn btn-gold">تصفح البحوث المنشورة 📄</a>
            <a href="#" onclick="alert('جاري تجهيز قاعدة بيانات Excel دكتورة!')" class="btn btn-gold">تحميل بيانات Excel 📊</a>
        </div>
    </div>

</body>
</html>
