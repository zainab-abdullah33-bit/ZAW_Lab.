<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Research Hub | منصة الباحثين العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: white; }
        .gold-border { border: 2px solid #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass max-w-md w-full rounded-3xl p-8 gold-border text-center">
        <!-- صورة الدكتورة زينب -->
        <div class="relative w-32 h-32 mx-auto mb-6">
            <img src="https://raw.githubusercontent.com/Zainabwaheed1984/ZAW_Lab/main/1715694770020.jpg" 
                 class="rounded-full w-full h-full object-cover border-4 border-yellow-400 shadow-2xl" alt="Dr. Zainab">
            <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-4 border-slate-900 shadow-lg"></div>
        </div>

        <h1 class="text-3xl font-bold text-yellow-400 mb-2">ZAW Research Hub</h1>
        <p class="text-slate-300 text-sm mb-8">بوابة الباحثين العلمية المتطورة لنتائج PDB و GROMACS</p>

        <!-- نظام التسجيل المتصل بـ Firebase -->
        <div id="auth-section" class="space-y-4">
            <input id="email" type="email" placeholder="البريد الإلكتروني للباحث" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-yellow-400">
            <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-yellow-400">
            <button onclick="register()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-bold py-3 rounded-xl transition duration-300 shadow-lg">إنشاء حساب باحث جديد</button>
            <p id="status" class="text-xs text-yellow-200 mt-4"></p>
        </div>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // مفاتيح الربط التي استخرجتِها دكتورة
        const firebaseConfig = {
            apiKey: "AIzaSyAqc7a5CRtjMRmuBwPWC5TXWMQkMGIlQuQ",
            authDomain: "zaw-research-hub.firebaseapp.com",
            projectId: "zaw-research-hub",
            storageBucket: "zaw-research-hub.firebasestorage.app",
            messagingSenderId: "750460537109",
            appId: "1:750460537109:web:687d785a83a3c8d2d2011c",
            measurementId: "G-F95MJ5EQGX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.register = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                status.innerText = "✅ تم تسجيلك بنجاح في مختبر ZAW الرقمي!";
                status.classList.add('text-green-400');
            } catch (error) {
                status.innerText = "❌ خطأ: " + error.message;
                status.classList.add('text-red-400');
            }
        };
    </script>
</body>
</html>
