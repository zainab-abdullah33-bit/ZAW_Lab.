<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ZAW للتعاون البحثي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); border: 2px solid var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        h2, h3 { color: var(--gold); margin: 5px 0; font-size: 1.2em; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        /* أزرار فائقة الاستجابة */
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; margin: 5px 0; transition: 0.2s; display: block; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        #wall { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 10px; max-height: 250px; overflow-y: auto; text-align: right; border: 1px solid #444; }
        .post { background: #26354a; border-right: 4px solid var(--gold); padding: 8px; margin-bottom: 8px; border-radius: 5px; font-size: 13px; }
        #profileInfo { display: none; background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body onload="initApp()">

    <div class="container">
        <h2>🧬 منصة التعاون البحثي الدولي</h2>

        <div id="profileInfo" class="card">
            <h3 style="font-size:1em;">👤 الباحثة: <span id="savedN"></span></h3>
            <p id="savedB" style="font-size:0.8em; margin:0; opacity:0.8;"></p>
        </div>

        <div class="card" id="loginCard">
            <h3>🔐 تفعيل هوية الباحث</h3>
            <input type="text" id="uName" placeholder="الاسم الكامل...">
            <input type="text" id="uBio" placeholder="التخصص الدقيق...">
            <button class="btn btn-gold" onclick="saveData()">حفظ التفعيل الدائم ✅</button>
        </div>

        <div class="card">
            <h3>📢 جدار التعاون (العربي والأجنبي)</h3>
            <input type="text" id="msg" placeholder="اكتبي طلب التعاون هنا...">
            <button class="btn btn-blue" onclick="sendPost()">نشر الإشعار للعالم 🚀</button>
            <button class="btn" style="background:#475569; color:white; font-size:12px;" onclick="loadPosts()">تحديث الجدار لرؤية الزملاء 🔄</button>
            <div id="wall">جاري جلب المنشورات...</div>
        </div>

        <div class="card" style="border-color: var(--blue);">
            <h3>🏛️ قاعات الاجتماعات المباشرة</h3>
            <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Conference_Main', '_blank')">🏛️ القاعة الكبرى (المؤتمرات)</button>
            <button class="btn btn-green" onclick="window.open('https://meet.jit.si/ZAW_Arabic_Scientists', '_blank')">🌍 غرفة الباحثين العرب</button>
            <button class="btn btn-gold" onclick="window.open('https://meet.jit.si/ZAW_International_Lab', '_blank')">🔬 المختبر الدولي (للأجانب)</button>
        </div>
    </div>

    <script>
        // إعدادات القاعدة
        const config = { databaseURL: "https://zaw-platform-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        function saveData() {
            const n = document.getElementById('uName').value;
            const b = document.getElementById('uBio').value;
            if(n && b) {
                localStorage.setItem('dr_n', n);
                localStorage.setItem('dr_b', b);
                location.reload();
            } else { alert("أكملي البيانات دكتورة"); }
        }

        function initApp() {
            const n = localStorage.getItem('dr_n');
            const b = localStorage.getItem('dr_b');
            if(n) {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('profileInfo').style.display = 'block';
                document.getElementById('savedN').innerText = n;
                document.getElementById('savedB').innerText = b;
                loadPosts();
            }
        }

        function sendPost() {
            const n = localStorage.getItem('dr_n');
            const m = document.getElementById('msg').value;
            if(!n) return alert("سجلي دخولكِ أولاً");
            if(!m) return;

            db.ref('final_wall').push({ u: n, m: m, t: new Date().toLocaleTimeString('ar-EG') })
            .then(() => { document.getElementById('msg').value = ""; loadPosts(); });
        }

        function loadPosts() {
            db.ref('final_wall').limitToLast(10).once('value', (s) => {
                const wall = document.getElementById('wall');
                wall.innerHTML = "";
                const data = s.val();
                if(data) {
                    Object.values(data).reverse().forEach(p => {
                        const d = document.createElement('div');
                        d.className = 'post';
                        d.innerHTML = <b>${p.u}</b>: ${p.m} <br><small style="color:var(--gold)">${p.t}</small>;
                        wall.appendChild(d);
                    });
                } else { wall.innerHTML = "لا توجد منشورات حالياً."; }
            });
        }
    </script>
</body>
</html>
