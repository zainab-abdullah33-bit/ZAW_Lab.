<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة التعاون البحثي الدولي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #D4AF37; --blue: #2563eb; --dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; text-align: center; padding: 15px; }
        .box { background: #1e293b; border: 1.5px solid var(--gold); border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 500px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #0f172a; color: white; }
        .btn { width: 95%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        #wall { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 15px; max-height: 400px; overflow-y: auto; text-align: right; }
        .post { background: #1e293b; border-right: 5px solid var(--gold); padding: 12px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body onload="initApp()">

    <h1>🧬 منصة التعاون البحثي الدولي</h1>

    <div class="box">
        <button class="btn btn-blue" onclick="askPermission()">تفعيل جرس التنبيهات 🔔</button>
        <p id="notifStatus" style="font-size: 11px; margin-top: 5px;"></p>
    </div>

    <div class="box">
        <h3>👤 هويتكِ العلمية</h3>
        <input type="text" id="userName" placeholder="الاسم الكامل">
        <input type="text" id="userBio" placeholder="التخصص الدقيق">
        <button class="btn btn-gold" onclick="saveProfile()">حفظ التفعيل ✅</button>
    </div>

    <div class="box">
        <h3>📢 جدار التعاون العالمي</h3>
        <input type="text" id="postText" placeholder="اكتبي طلبكِ البحثي هنا...">
        <button class="btn btn-blue" onclick="sendPost()">نشر للجميع 🚀</button>
        <div id="wall"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://zaw-platform-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. طلب إذن الإشعارات من المتصفح
        function askPermission() {
            Notification.requestPermission().then(perm => {
                if(perm === "granted") {
                    document.getElementById('notifStatus').innerText = "✅ الجرس مفعل! ستصلكِ تنبيهات فورية.";
                    new Notification("منصة ZAW", { body: "تم تفعيل الإشعارات بنجاح دكتورة زينب" });
                } else {
                    alert("دكتورة، يرجى السماح بالإشعارات من إعدادات المتصفح (القفل بجانب الرابط).");
                }
            });
        }

        function saveProfile() {
            localStorage.setItem('zn', document.getElementById('userName').value);
            localStorage.setItem('zb', document.getElementById('userBio').value);
            alert("تم الحفظ");
        }

        function sendPost() {
            const name = localStorage.getItem('zn');
            const text = document.getElementById('postText').value;
            if(!name || !text) return alert("أكملي البيانات دكتورة");

            db.ref('posts').push({ name: name, text: text, time: new Date().toLocaleTimeString() });
            document.getElementById('postText').value = "";
        }

        function initApp() {
            // تحميل البيانات المحفوظة
            document.getElementById('userName').value = localStorage.getItem('zn') || "";
            document.getElementById('userBio').value = localStorage.getItem('zb') || "";

            // مراقبة قاعدة البيانات وإرسال إشعار عند وجود منشور جديد
            db.ref('posts').limitToLast(1).on('child_added', (snapshot) => {
                const post = snapshot.val();
                const wall = document.getElementById('wall');
                
                // إضافة المنشور للجدار
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = <strong>${post.name}</strong>: ${post.text};
                wall.prepend(div);

                // إرسال إشعار (Notification) إذا كان المتصفح يدعم ذلك والمنشور ليس من صاحب الجهاز
                if (Notification.permission === "granted" && post.name !== localStorage.getItem('zn')) {
                    new Notification("طلب بحثي جديد!", {
                        body: الباحث ${post.name} نشر طلباً جديداً الآن.,
                        icon: "https://cdn-icons-png.flaticon.com/512/1043/1043301.png"
                    });
                }
            });
        }
    </script>
</body>
</html>
