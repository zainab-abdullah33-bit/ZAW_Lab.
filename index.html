[6:24 م، 2026/4/5] زينب عبدالله: <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAW Global Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --blue: #3b82f6; --dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; }
        header { background: #000; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--gold); }
        input { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; margin-top: 5px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 20px; border: 2px solid var(--gold); z-index: 100; width: 80%; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 50; }
    </style>
</head>
<body onload="loadUser()">

    <header>
        <div onclick="openPop()" style="cursor:pointer; border:1px solid var(--gold); padding:5px 10px; border-radius:20px;">
            👤 <span id="topName">دخول الباحث</span>
        </div>
        <div style="color:var(--gold); font-weight:bold;">ZAW HUB</div>
    </header>

    <div class="container">
        <h2 style="text-align:center;">مشروع العمر الأكاديمي 🧬</h2>

        <!-- 1. البحث -->
        <div class="card">
            <h3 style="margin-top:0; color:var(--gold);">🔍 البحث العلمي</h3>
            <input type="text" id="searchInput" placeholder="اكتبي عنوان البحث...">
            <button class="btn btn-blue" onclick="var q=document.getElementById('searchInput').value; if(q) window.open('https://scholar.google.com/scholar?q='+encodeURIComponent(q));">بحث رصين 🔎</button>
        </div>

        <!-- 2. التعاون -->
        <div class="card">
            <h3 style="margin-top:0; color:var(--gold);">🤝 طلب تعاون</h3>
            <button class="btn btn-gold" onclick="addPost()">نشر طلب تعاون باسمي</button>
            <div id="posts" style="margin-top:10px; font-size:14px;"></div>
        </div>

        <!-- 3. القاعة -->
        <div class="card" style="border-color:var(--blue);">
            <h3 style="margin-top:0; color:var(--blue);">🏛️ قاعة المؤتمرات</h3>
            <button class="btn btn-blue" onclick="window.open('https://meet.jit.si/ZAW_Room_2026')">دخول الاجتماع 📹</button>
        </div>
    </div>

    <!-- نافذة التسجيل -->
    <div id="overlay" class="overlay" onclick="closePop()"></div>
    <div id="pop" class="modal">
        <h3>ملف الباحث</h3>
        <input type="text" id="uName" placeholder="الاسم الكامل">
        <input type="text" id="uBio" placeholder="التخصص">
        <button class="btn btn-gold" onclick="save()">حفظ البيانات</button>
    </div>

    <script>
        function openPop() { document.getElementById('pop').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function closePop() { document.getElementById('pop').style.display='none'; document.getElementById('overlay').style.display='none'; }
        function save() {
            localStorage.setItem('n', document.getElementById('uName').value);
            localStorage.setItem('b', document.getElementById('uBio').value);
            location.reload();
        }
        function loadUser() {
            var n = localStorage.getItem('n');
            if(n) { document.getElementById('topName').innerText = n; }
        }
        function addPost() {
            var n = localStorage.getItem('n');
            if(!n) { alert('سجلي دخولكِ من الأعلى أولاً دكتورة'); openPop(); return; }
            var d = document.createElement('div');
            d.innerHTML = "📍 <b>" + n + "</b> طلب تعاوناً الآن";
            d.style.padding = "5px"; d.style.borderBottom = "1px dashed #555";
            document.getElementById('posts').prepend(d);
        }
    </script>
</body>
</html>
